        ENV_FILE="$ENV_DEV"
      fi

      if [ -z "$ENV_FILE" ]; then
        echo "❌ ERROR: GitLab variable ENV_DEV/ENV_PROD tidak ditemukan!"
        exit 1
      fi

      echo "$ENV_FILE" > .env
      echo "✅ .env file generated (preview):"
      head -n 5 .env

      docker info
      apk add --no-cache curl
      curl -v https://$REGISTRY_URL/v2/
      echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER --password-stdin $REGISTRY_URL
      docker build --network host -t $IMAGE_NAME:$TAG .
      docker push $IMAGE_NAME:$TAG
  rules:
    - if: '$CI_COMMIT_BRANCH == "production"'

# =============================
# ✅ DEPLOY PRODUCTION JOB
